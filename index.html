<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Annu ❤️</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;600&display=swap');

        /* 1. Basic Setup for Instant Load */
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #000; overflow: hidden;
            font-family: 'Poppins', sans-serif;
            display: flex; justify-content: center; align-items: center;
        }

        /* 2. Start Button - CSS Only for reliable display */
        #start-screen {
            position: absolute; z-index: 100;
        }

        .btn {
            padding: 18px 45px; font-size: 1.4rem; font-weight: bold;
            color: #ff00de; background: transparent; border: 3px solid #ff00de;
            border-radius: 50px; cursor: pointer; text-transform: uppercase;
            letter-spacing: 2px; box-shadow: 0 0 15px #ff00de, inset 0 0 10px #ff00de;
            transition: 0.3s;
        }

        .btn:hover {
            background-color: #ff00de; color: #fff;
            box-shadow: 0 0 40px #ff00de, 0 0 80px #ff00de;
        }

        /* 3. Phased Content (Hidden Initially) */
        .phase { display: none; text-align: center; width: 100%; position: absolute; }

        /* Neon & Glitch for Title */
        .neon-title {
            font-family: 'Dancing Script', cursive; font-size: 4rem;
            color: #fff; text-shadow: 0 0 15px #ff00de, 0 0 30px #ff00de, 0 0 60px #ff00de;
            margin: 0; animation: glitch 1.5s linear infinite;
        }

        .neon-sub {
            font-size: 1.5rem; color: #00f2ff; text-shadow: 0 0 10px #00f2ff, 0 0 20px #00f2ff;
            font-weight: 300; letter-spacing: 2px; margin-top: 15px; margin-bottom: 30px;
        }

        /* Glitch Animation */
        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
            100% { transform: translate(0); }
        }

        /* 4. Falling Hearts (CSS Animation) */
        #heart-zone {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 20;
        }

        .heart-rain {
            position: absolute; font-size: 30px; animation: fall 3s linear forwards;
            filter: drop-shadow(0 0 10px currentColor);
        }

        @keyframes fall {
            from { top: -50px; opacity: 1; }
            to { top: 110vh; opacity: 0; transform: rotate(360deg); }
        }

        /* 5. Final Love Wall (CSS Grid) */
        #love-wall {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 1000; overflow: hidden;
            display: grid; grid-template-columns: repeat(5, 1fr); /* Divides into 5 columns */
            padding: 10px; box-sizing: border-box;
        }

        .small-love {
            position: relative; font-weight: bold; white-space: nowrap;
            font-family: 'Dancing Script', cursive; /* Elegant font */
            animation: pulse-glow 1s infinite alternate;
            justify-self: center; align-self: center; font-size: 12px; text-transform: uppercase;
        }

        /* Final Glow Animation */
        @keyframes pulse-glow {
            from { opacity: 0.4; text-shadow: 0 0 5px currentColor; transform: scale(0.95); }
            to { opacity: 1; text-shadow: 0 0 15px currentColor; transform: scale(1.05); }
        }

    </style>
</head>
<body>

    <div id="start-screen">
        <button class="btn" onclick="runStory()">Annu Click Karo ❤️</button>
    </div>

    <div id="message-screen" class="phase">
        <h1 class="neon-title">Hey Annu!</h1>
        <p class="neon-sub">You Are Special... My Half GF! ✨</p>
    </div>

    <div id="heart-zone"></div>
    <div id="love-wall"></div>

    <script>
        function runStory() {
            document.getElementById('start-screen').style.display = 'none';

            // Phase 1: Heart Rain (Start immediately)
            startHeartRain();

            // Phase 2: Show Special Message after 3 seconds
            setTimeout(() => {
                document.getElementById('message-screen').style.display = 'block';
                document.getElementById('message-screen').innerHTML = "<h1 class='neon-title'>I Love You Annu ❤️</h1><p class='neon-sub'>Tu Bahut Achi Hai... Aur Tu Meri Half GF Hai! ✨</p>";
            }, 3000);

            // Phase 3: Grand Finale after 9 seconds
            setTimeout(() => {
                // Remove Hearts Rain for clean transition
                const zone = document.getElementById('heart-zone');
                zone.style.display = 'none';
                
                // Show final structured Love Wall
                showLoveWall();
            }, 10000);
        }

        function startHeartRain() {
            const zone = document.getElementById('heart-zone');
            zone.style.display = 'block';
            
            const heartColors = ['#ff00de', '#00f2ff', '#00ffcc', '#ffbd00', '#ff4d4d', '#fff'];
            
            // Create a heart every 150ms
            setInterval(() => {
                const h = document.createElement('div');
                h.className = 'heart-rain';
                h.innerText = '❤️';
                
                // Random properties
                h.style.left = Math.random() * 100 + 'vw';
                h.style.color = heartColors[Math.floor(Math.random() * heartColors.length)];
                h.style.fontSize = (Math.random() * 20 + 20) + 'px'; // 20-40px
                h.style.animationDuration = (Math.random() * 2 + 2) + 's'; // 2-4s fall time
                
                zone.appendChild(h);
                
                // Clean up heart after animation ends
                setTimeout(() => { h.remove(); }, 4000); 
            }, 150); 
        }

        function showLoveWall() {
            const wall = document.getElementById('love-wall');
            wall.style.display = 'grid'; // Grid on
            const colors = ['#ff00de', '#00f2ff', '#00ffcc', '#ffbd00', '#ff4d4d', '#fff'];
            
            // Generate clean neon text grid
            // 5 columns * 15 rows = 75 text instances, optimal for mobile without crowding.
            for(let i=0; i<80; i++) {
                const span = document.createElement('span');
                span.className = 'small-love';
                span.innerText = 'I ❤️ ANNU'; // Heart included
                const color = colors[Math.floor(Math.random()*colors.length)];
                span.style.color = color;
                span.style.animationDelay = (Math.random() * 2) + 's'; // Random pulse delay
                wall.appendChild(span);
            }
        }
    </script>
</body>
</html>
