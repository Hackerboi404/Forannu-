<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Annu ❤️</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Monoton&family=Pacifico&display=swap');

        body {
            margin: 0; background-color: #000; overflow: hidden;
            font-family: 'Poppins', sans-serif; height: 100vh;
            display: flex; justify-content: center; align-items: center;
        }

        canvas { position: absolute; top: 0; left: 0; z-index: 1; }
        #ui-layer { position: relative; z-index: 10; text-align: center; width: 100%; }

        .start-btn {
            padding: 20px 50px; font-size: 1.5rem; background: transparent;
            color: #ff00de; border: 4px solid #ff00de; border-radius: 50px;
            cursor: pointer; box-shadow: 0 0 30px #ff00de; font-family: 'Monoton', cursive;
        }

        .neon-msg {
            display: none; font-family: 'Monoton', cursive; font-size: 2.5rem;
            color: #fff; text-shadow: 0 0 10px #ff00de, 0 0 20px #ff00de;
            animation: pulse 1s infinite alternate; margin-bottom: 20px;
        }

        .stage { display: none; position: relative; height: 300px; width: 100%; }
        .neon-char { position: absolute; bottom: 20px; width: 100px; transition: all 2.5s ease-in-out; }
        #boy { left: -150px; stroke: #00f2ff; filter: drop-shadow(0 0 15px #00f2ff); }
        #girl { right: -150px; stroke: #ff00de; filter: drop-shadow(0 0 15px #ff00de); }
        .walk-in #boy { left: calc(50% - 75px); }
        .walk-in #girl { right: calc(50% - 75px); z-index: 11; }

        #love-wall {
            display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: #000; z-index: 1000; overflow: hidden;
            display: grid; grid-template-columns: repeat(6, 1fr); padding: 10px;
        }
        .small-love {
            font-size: 10px; font-weight: bold; text-align: center;
            align-self: center; animation: glow 2s infinite alternate;
            font-family: Arial, sans-serif;
        }

        @keyframes glow { from { opacity: 0.4; transform: scale(0.9); } to { opacity: 1; text-shadow: 0 0 10px currentColor; transform: scale(1.1); } }
        @keyframes fall { to { transform: translateY(110vh) rotate(360deg); } }
        @keyframes pulse { from { opacity: 0.8; transform: scale(0.95); } to { opacity: 1; transform: scale(1.05); } }

        #tamatar-zone { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 20; }
        .tomato-rain { position: absolute; font-size: 30px; animation: fall 3s linear forwards; }
    </style>
</head>
<body>

    <canvas id="canvas"></canvas>

    <div id="ui-layer">
        <div id="start-screen">
            <button class="start-btn" onclick="runStory()">Annu Click Karo ❤️</button>
        </div>
        <div id="message-screen" class="neon-msg">
            I LOVE YOU ANNU ❤️<br>
            <span style="font-size: 1.2rem; color: #00f2ff;">Half Gf Hai Tu Meri! ✨</span>
        </div>
        <div id="dance-stage" class="stage">
            <svg id="boy" class="neon-char" viewBox="0 0 100 200">
                <circle cx="50" cy="30" r="15" fill="none" stroke-width="5"/><line x1="50" y1="45" x2="50" y2="120" stroke-width="5"/><line x1="50" y1="70" x2="85" y2="60" stroke-width="5"/><line x1="50" y1="70" x2="15" y2="60" stroke-width="5"/><line x1="50" y1="120" x2="30" y2="180" stroke-width="5"/><line x1="50" y1="120" x2="70" y2="180" stroke-width="5"/>
            </svg>
            <svg id="girl" class="neon-char" viewBox="0 0 100 200">
                <circle cx="50" cy="30" r="15" fill="none" stroke-width="5"/><path d="M50 45 L30 120 L70 120 Z" fill="none" stroke-width="5"/><line x1="40" y1="70" x2="10" y2="60" stroke-width="5"/><line x1="60" y1="70" x2="90" y2="60" stroke-width="5"/><line x1="40" y1="120" x2="30" y2="180" stroke-width="5"/><line x1="60" y1="120" x2="70" y2="180" stroke-width="5"/>
            </svg>
        </div>
    </div>

    <div id="tamatar-zone"></div>
    <div id="love-wall"></div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize);
        resize();

        function createBlast(x, y) {
            const color = `hsl(${Math.random()*360}, 100%, 50%)`;
            for(let i=0; i<25; i++) {
                particles.push({x, y, vx: (Math.random()-0.5)*10, vy: (Math.random()-0.5)*10, life: 1, color});
            }
        }

        function render() {
            ctx.fillStyle = 'rgba(0,0,0,0.2)';
            ctx.fillRect(0,0,canvas.width, canvas.height);
            particles.forEach((p, i) => {
                p.x += p.vx; p.y += p.vy; p.life -= 0.02;
                ctx.fillStyle = p.color; ctx.beginPath(); ctx.arc(p.x, p.y, 2, 0, Math.PI*2); ctx.fill();
                if(p.life <= 0) particles.splice(i, 1);
            });
            requestAnimationFrame(render);
        }

        function runStory() {
            document.getElementById('start-screen').style.display = 'none';
            render();

            // Fireworks sequence
            const bInt = setInterval(() => createBlast(Math.random()*canvas.width, Math.random()*canvas.height), 700);

            // Show text after fireworks
            setTimeout(() => document.getElementById('message-screen').style.display = 'block', 1500);

            // Switch to Dance & Hug after 5 seconds
            setTimeout(() => {
                clearInterval(bInt);
                document.getElementById('message-screen').style.display = 'none';
                const stage = document.getElementById('dance-stage');
                stage.style.display = 'block';
                setTimeout(() => stage.classList.add('walk-in'), 500);
                setTimeout(showTamatar, 4500);
            }, 6000);
        }

        function showTamatar() {
            document.getElementById('tamatar-zone').style.display = 'block';
            const msg = document.getElementById('message-screen');
            msg.innerHTML = "<div style='color:#ff4d4d; font-size:1.8rem; text-shadow: 0 0 10px #f00;'>TERE TAMATAR CHIYE MUJHE! 🍅😋</div>";
            msg.style.display = 'block';

            const tRain = setInterval(() => {
                const t = document.createElement('div');
                t.className = 'tomato-rain'; t.innerHTML = '🍅';
                t.style.left = Math.random() * 95 + 'vw';
                document.getElementById('tamatar-zone').appendChild(t);
                setTimeout(() => t.remove(), 3000);
            }, 200);

            // Final transition to Love Wall
            setTimeout(() => {
                clearInterval(tRain);
                showLoveWall();
            }, 7000);
        }

        function showLoveWall() {
            const wall = document.getElementById('love-wall');
            wall.style.display = 'grid';
            const colors = ['#ff00de', '#00f2ff', '#00ffcc', '#ffbd00', '#ff4d4d', '#fff'];
            
            for(let i=0; i<180; i++) {
                const span = document.createElement('span');
                span.className = 'small-love';
                span.innerText = 'I ❤️ ANNU';
                const color = colors[Math.floor(Math.random()*colors.length)];
                span.style.color = color;
                span.style.margin = "8px 0";
                wall.appendChild(span);
            }
        }
    </script>
</body>
</html>
