<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Annu ❤️</title>
    <style>
        /* 1. Reset & Base Style */
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #000; color: #fff; overflow: hidden;
            font-family: 'Arial', sans-serif;
            display: flex; justify-content: center; align-items: center;
        }

        /* 2. Canvas stays in background */
        canvas { position: absolute; top: 0; left: 0; z-index: 1; }

        /* 3. UI Layer - Visible by default to avoid black screen */
        #ui { position: relative; z-index: 100; text-align: center; width: 100%; }

        .btn {
            padding: 18px 40px; font-size: 1.2rem; background: none;
            color: #ff00de; border: 3px solid #ff00de; border-radius: 50px;
            cursor: pointer; font-weight: bold; box-shadow: 0 0 15px #ff00de;
            text-transform: uppercase;
        }

        .neon-msg {
            display: none; font-size: 2.2rem; font-weight: bold;
            color: #fff; text-shadow: 0 0 10px #ff00de, 0 0 30px #ff00de;
            animation: pulse 1s infinite alternate;
        }

        /* 4. Final Love Wall */
        #love-wall {
            display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: #000; z-index: 1000; grid-template-columns: repeat(5, 1fr);
            padding: 10px; overflow: hidden;
        }
        .small-love {
            font-size: 10px; text-align: center; align-self: center;
            animation: glow 1.5s infinite alternate; font-weight: bold;
        }

        @keyframes glow { from { opacity: 0.3; } to { opacity: 1; text-shadow: 0 0 10px currentColor; } }
        @keyframes pulse { from { transform: scale(0.95); } to { transform: scale(1.05); } }
        @keyframes fall { to { transform: translateY(110vh) rotate(360deg); } }
        .tomato { position: absolute; font-size: 30px; animation: fall 3s linear forwards; z-index: 500; }
    </style>
</head>
<body>

    <canvas id="c"></canvas>

    <div id="ui">
        <button id="main-btn" class="btn" onclick="startApp()">Annu Click Karo ❤️</button>
        <div id="msg" class="neon-msg">
            I LOVE YOU ANNU ❤️<br>
            <span style="font-size: 1.2rem; color: #00f2ff; text-shadow: 0 0 10px #00f2ff;">Half Gf Hai Tu Meri! ✨</span>
        </div>
    </div>

    <div id="love-wall"></div>

    <script>
        const canvas = document.getElementById('c');
        const ctx = canvas.getContext('2d');
        let parts = [];

        // Canvas setup immediately
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize);
        resize();

        function blast(x, y) {
            let col = `hsl(${Math.random() * 360}, 100%, 50%)`;
            for (let i = 0; i < 15; i++) {
                parts.push({ x, y, vx: (Math.random() - 0.5) * 8, vy: (Math.random() - 0.5) * 8, l: 1, c: col });
            }
        }

        function render() {
            ctx.fillStyle = 'rgba(0,0,0,0.2)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            parts.forEach((p, i) => {
                p.x += p.vx; p.y += p.vy; p.l -= 0.03;
                ctx.fillStyle = p.c; ctx.beginPath(); ctx.arc(p.x, p.y, 2, 0, Math.PI * 2); ctx.fill();
                if (p.l <= 0) parts.splice(i, 1);
            });
            requestAnimationFrame(render);
        }

        // Ye function tabhi chalega jab button click hoga
        function startApp() {
            document.getElementById('main-btn').style.display = 'none';
            document.getElementById('msg').style.display = 'block';
            
            // Start Canvas Animation
            render();
            const fire = setInterval(() => blast(Math.random() * canvas.width, Math.random() * canvas.height), 700);

            // 5 second baad Tamatar
            setTimeout(() => {
                document.getElementById('msg').innerHTML = "<div style='color:#ff4d4d;'>TERE TAMATAR CHIYE MUJHE! 🍅😋</div>";
                const rain = setInterval(() => {
                    const t = document.createElement('div');
                    t.className = 'tomato'; t.innerHTML = '🍅';
                    t.style.left = Math.random() * 90 + 'vw';
                    t.style.top = '-50px';
                    document.body.appendChild(t);
                    setTimeout(() => t.remove(), 2800);
                }, 200);

                // Final Love Wall
                setTimeout(() => {
                    clearInterval(fire);
                    clearInterval(rain);
                    showWall();
                }, 6000);
            }, 5000);
        }

        function showWall() {
            const w = document.getElementById('love-wall');
            w.style.display = 'grid';
            const cols = ['#ff00de', '#00f2ff', '#00ffcc', '#ffbd00', '#ff4d4d'];
            for (let i = 0; i < 150; i++) {
                const s = document.createElement('span');
                s.className = 'small-love'; s.innerText = 'I ❤️ ANNU';
                s.style.color = cols[Math.floor(Math.random() * cols.length)];
                w.appendChild(s);
            }
        }
    </script>
</body>
</html>
