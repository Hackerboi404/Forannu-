<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Annu ❤️</title>
    <style>
        /* 1. Basic Reset */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: #000;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
        }

        /* 2. Start Button - Iska display hamesha on rahega */
        #start-btn {
            padding: 20px 40px;
            font-size: 1.5rem;
            color: #ff00de;
            background: transparent;
            border: 3px solid #ff00de;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 0 20px #ff00de;
            z-index: 9999;
            text-transform: uppercase;
            font-weight: bold;
        }

        /* 3. Love Wall - Grid Pehle se ready hai */
        #love-wall {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: #000;
            z-index: 1000;
            grid-template-columns: repeat(5, 1fr);
            padding: 10px;
            overflow: hidden;
        }

        .small-love {
            font-size: 10px;
            text-align: center;
            align-self: center;
            animation: flash 1s infinite alternate;
            color: #ff00de;
        }

        @keyframes flash {
            from { opacity: 0.3; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1.1); text-shadow: 0 0 10px currentColor; }
        }

        /* 4. Tamatar Style */
        #tamatar-box {
            display: none;
            position: absolute;
            color: #ff4d4d;
            font-size: 2rem;
            text-align: center;
            z-index: 500;
            text-shadow: 0 0 20px #f00;
        }

        .tomato {
            position: absolute;
            font-size: 30px;
            animation: fall 3s linear forwards;
        }

        @keyframes fall {
            to { transform: translateY(110vh) rotate(360deg); }
        }
    </style>
</head>
<body>

    <button id="start-btn" onclick="startSurprise()">Annu Click Karo ❤️</button>

    <div id="tamatar-box">
        TERE TAMATAR CHIYE MUJHE! 🍅😋
    </div>

    <div id="love-wall"></div>

    <script>
        function startSurprise() {
            // Button hide karo
            document.getElementById('start-btn').style.display = 'none';
            
            // 1. Show Tamatar Message
            const tBox = document.getElementById('tamatar-box');
            tBox.style.display = 'block';

            // 2. Tomato Rain
            const rainInterval = setInterval(() => {
                const t = document.createElement('div');
                t.className = 'tomato';
                t.innerHTML = '🍅';
                t.style.left = Math.random() * 95 + 'vw';
                t.style.top = '-50px';
                document.body.appendChild(t);
                setTimeout(() => t.remove(), 3000);
            }, 200);

            // 3. Final Love Wall after 5 seconds
            setTimeout(() => {
                clearInterval(rainInterval);
                tBox.style.display = 'none';
                showFinalWall();
            }, 5000);
        }

        function showFinalWall() {
            const wall = document.getElementById('love-wall');
            wall.style.display = 'grid';
            const colors = ['#ff00de', '#00f2ff', '#00ffcc', '#ffbd00', '#ff4d4d'];
            
            for(let i=0; i<150; i++) {
                const span = document.createElement('span');
                span.className = 'small-love';
                span.innerText = 'I ❤️ ANNU';
                span.style.color = colors[Math.floor(Math.random()*colors.length)];
                wall.appendChild(span);
            }
        }
    </script>
</body>
</html>
